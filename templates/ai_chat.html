{% extends 'base.html' %}
{% block content %}
<h2>AI Assistant</h2>
<p class="text-muted mb-3">Voice + image guided AI treatment assistant.</p>

{% if not has_api_key %}
<div class="alert alert-warning">
    OPENAI_API_KEY is not configured. Add it in your environment or `.env` file.
</div>
{% endif %}

<form id="chat-form" class="mb-3">
    <div class="form-group">
        <label for="query">Your question</label>
        <input type="text" id="query" class="form-control" required placeholder="Type your question">
    </div>
    <div class="form-group">
        <label for="ai-language">Response language</label>
        <select id="ai-language" class="form-control">
            <option value="auto">Auto (same as your question)</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
            <option value="ta">Tamil</option>
            <option value="kn">Kannada</option>
            <option value="mr">Marathi</option>
            <option value="bn">Bengali</option>
        </select>
    </div>
    <div class="mb-2 d-flex flex-wrap" style="gap: 8px;">
        <button class="btn btn-primary" type="submit">Ask AI</button>
        <button class="btn btn-secondary" type="button" id="voice-input-btn">Speak Input</button>
        <button class="btn btn-outline-primary" type="button" id="speak-all-btn">Speak All Steps</button>
        <button class="btn btn-outline-secondary" type="button" id="stop-voice-btn">Stop Voice</button>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="voice-output-toggle" checked>
        <label class="form-check-label" for="voice-output-toggle">
            Voice output enabled
        </label>
    </div>
</form>

<div id="chat-status" class="alert alert-secondary">Ready.</div>

<div class="card mb-3">
    <div class="card-body">
        <pre id="ai-response" class="mb-0" style="white-space: pre-wrap;"></pre>
    </div>
</div>

<div id="step-guide" class="guide-grid"></div>

<script>
const chatForm = document.getElementById('chat-form');
const queryInput = document.getElementById('query');
const aiLanguageSelect = document.getElementById('ai-language');
const aiResponse = document.getElementById('ai-response');
const chatStatus = document.getElementById('chat-status');
const voiceToggle = document.getElementById('voice-output-toggle');
const voiceInputBtn = document.getElementById('voice-input-btn');
const speakAllBtn = document.getElementById('speak-all-btn');
const stopVoiceBtn = document.getElementById('stop-voice-btn');
const stepGuide = document.getElementById('step-guide');

let currentSteps = [];
const aiLanguageMeta = {
  auto: {label: 'Auto', voiceLang: ''},
  en: {label: 'English', voiceLang: 'en-IN'},
  hi: {label: 'Hindi', voiceLang: 'hi-IN'},
  te: {label: 'Telugu', voiceLang: 'te-IN'},
  ta: {label: 'Tamil', voiceLang: 'ta-IN'},
  kn: {label: 'Kannada', voiceLang: 'kn-IN'},
  mr: {label: 'Marathi', voiceLang: 'mr-IN'},
  bn: {label: 'Bengali', voiceLang: 'bn-IN'}
};

const fallbackImage = "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_advises_patient.jpg";
const imageMap = {
  cpr: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_examines_patient_%283%29.jpg",
  breathing: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_examines_patient.jpg",
  unresponsive: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_examines_patient.jpg",
  bleeding: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_takes_blood_pressure.jpg",
  blood: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_takes_blood_pressure.jpg",
  choking: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_consults_with_patient_%281%29.jpg",
  burn: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_consults_with_patient_%287%29.jpg",
  fracture: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_consults_with_patient_%288%29.jpg",
  head: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_consults_with_patient_%288%29.jpg",
  seizure: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_talking_with_a_patient.jpg",
  heat: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_examines_pediatric_patient.jpg",
  stroke: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_examines_pediatric_patient.jpg",
  emergency: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_advises_patient.jpg",
  ambulance: "https://commons.wikimedia.org/wiki/Special:FilePath/Doctor_advises_patient.jpg"
};

function setStatus(message, type='secondary') {
  chatStatus.className = `alert alert-${type}`;
  chatStatus.innerText = message;
}

function getSelectedLangCode() {
  const code = aiLanguageSelect.value || 'auto';
  return aiLanguageMeta[code] ? code : 'auto';
}

function getVoiceLang() {
  const selected = getSelectedLangCode();
  if (selected !== 'auto') {
    return aiLanguageMeta[selected].voiceLang || 'en-IN';
  }

  const nav = (navigator.language || '').toLowerCase();
  if (nav.startsWith('hi')) return 'hi-IN';
  if (nav.startsWith('te')) return 'te-IN';
  if (nav.startsWith('ta')) return 'ta-IN';
  if (nav.startsWith('kn')) return 'kn-IN';
  if (nav.startsWith('mr')) return 'mr-IN';
  if (nav.startsWith('bn')) return 'bn-IN';
  return 'en-IN';
}

function stopVoice() {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
  }
}

function speak(text, onEnd) {
  if (!voiceToggle.checked || !text) {
    if (onEnd) onEnd();
    return;
  }
  if (!('speechSynthesis' in window)) {
    if (onEnd) onEnd();
    return;
  }
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = getVoiceLang();
  utterance.rate = 0.98;
  utterance.onend = () => onEnd && onEnd();
  speechSynthesis.speak(utterance);
}

function extractSteps(text) {
  const rawLines = (text || '').split('\n').map(l => l.trim()).filter(Boolean);
  const numbered = rawLines
    .filter(line => /^\d+[\).:-]?\s+/.test(line))
    .map(line => line.replace(/^\d+[\).:-]?\s+/, '').trim())
    .filter(Boolean);

  if (numbered.length) return numbered;

  const sentenceSplit = (text || '').split(/(?<=[.!?])\s+/).map(s => s.trim()).filter(Boolean);
  return sentenceSplit.slice(0, 8);
}

function imageForStep(stepText) {
  const text = (stepText || '').toLowerCase();
  for (const key of Object.keys(imageMap)) {
    if (text.includes(key)) return imageMap[key];
  }
  return fallbackImage;
}

function highlightCard(index) {
  document.querySelectorAll('.guide-card').forEach(c => c.classList.remove('active'));
  const active = document.getElementById(`ai-step-${index}`);
  if (active) {
    active.classList.add('active');
    active.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
}

function renderStepGuide(steps) {
  stepGuide.innerHTML = '';
  if (!steps.length) return;

  steps.forEach((stepText, i) => {
    const card = document.createElement('article');
    card.className = 'guide-card';
    card.id = `ai-step-${i}`;

    const img = document.createElement('img');
    img.className = 'guide-image';
    img.src = imageForStep(stepText);
    img.alt = `Guidance image for step ${i + 1}`;
    img.onerror = () => { img.onerror = null; img.src = "{{ url_for('static', filename='images/hos.jpg') }}"; };

    const title = document.createElement('h5');
    title.textContent = `Step ${i + 1}`;

    const line = document.createElement('p');
    line.className = 'mb-2';
    line.textContent = stepText;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn btn-sm btn-outline-primary';
    btn.textContent = 'Speak this step';
    btn.addEventListener('click', () => {
      stopVoice();
      highlightCard(i);
      speak(`Step ${i + 1}. ${stepText}`);
    });

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(line);
    card.appendChild(btn);
    stepGuide.appendChild(card);
  });
}

function speakAllSteps() {
  if (!currentSteps.length) return;
  stopVoice();
  let i = 0;

  function run() {
    if (i >= currentSteps.length) return;
    highlightCard(i);
    speak(`Step ${i + 1}. ${currentSteps[i]}`, () => {
      i += 1;
      run();
    });
  }

  run();
}

chatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const query = queryInput.value.trim();
  if (!query) {
    setStatus('Please enter a message.', 'warning');
    return;
  }

  setStatus('Thinking...', 'info');
  aiResponse.textContent = '';
  stepGuide.innerHTML = '';
  currentSteps = [];

  try {
    const selectedLang = getSelectedLangCode();
    const resp = await fetch('/api/ai/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        query,
        language: selectedLang === 'auto' ? '' : selectedLang
      })
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      setStatus(data.error || 'AI request failed.', 'danger');
      return;
    }

    aiResponse.textContent = data.response;
    currentSteps = extractSteps(data.response);
    renderStepGuide(currentSteps);
    setStatus(`Response received. ${currentSteps.length} guided step(s) ready.`, 'success');

    if (currentSteps.length) {
      speakAllSteps();
    } else {
      speak(data.response);
    }
  } catch (err) {
    setStatus('Network or server error while calling AI.', 'danger');
  }
});

speakAllBtn.addEventListener('click', speakAllSteps);
stopVoiceBtn.addEventListener('click', stopVoice);

if ('webkitSpeechRecognition' in window) {
  const recognition = new webkitSpeechRecognition();
  recognition.onresult = (event) => {
    queryInput.value = event.results[0][0].transcript;
  };
  voiceInputBtn.addEventListener('click', () => {
    recognition.lang = getVoiceLang();
    recognition.start();
  });
} else {
  voiceInputBtn.style.display = 'none';
}
</script>
{% endblock %}
